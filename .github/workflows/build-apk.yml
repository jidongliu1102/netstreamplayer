name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            libtinfo5 cmake libffi-dev \
            libssl-dev python3-pip || {
              echo "Some packages failed, trying alternative names..."
              sudo apt-get install -y -qq \
                git zip unzip \
                autoconf libtool \
                pkg-config zlib1g-dev libncurses-dev \
                cmake libffi-dev libssl-dev python3-pip
            }
          # Install JDK - try multiple names
          sudo apt-get install -y -qq openjdk-17-jdk 2>/dev/null || \
          sudo apt-get install -y -qq openjdk-21-jdk 2>/dev/null || \
          echo "WARNING: JDK installation failed, buildozer may not work"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          # First run triggers SDK download
          yes | buildozer android debug 2>&1 || true
          # Accept SDK licenses and install platform if buildozer already downloaded the SDK
          SDK=~/.buildozer/android/platform/android-sdk
          if [ -d "$SDK" ]; then
            yes | $SDK/tools/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
            yes | $SDK/tools/bin/sdkmanager --sdk_root=$SDK 'platforms;android-34' 2>/dev/null || true
          fi
          # Second run with licenses accepted
          yes | buildozer android debug 2>&1 || true
          echo "=== APK files ==="
          find . -name '*.apk' -ls 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NetStreamPlayer-APK
          path: bin/*.apk