name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            libtinfo5 cmake libffi-dev \
            libssl-dev python3-pip || {
              echo "Some packages failed, trying alternative names..."
              sudo apt-get install -y -qq \
                git zip unzip \
                autoconf libtool \
                pkg-config zlib1g-dev libncurses-dev \
                cmake libffi-dev libssl-dev python3-pip
            }
          # Install JDK - try multiple names
          sudo apt-get install -y -qq openjdk-17-jdk 2>/dev/null || \
          sudo apt-get install -y -qq openjdk-21-jdk 2>/dev/null || \
          echo "WARNING: JDK installation failed, buildozer may not work"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          # Download and set up Android SDK command-line tools manually
          echo "=== Setting up Android SDK ==="
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          SDK_ROOT=~/.buildozer/android/platform/android-sdk
          export ANDROIDSDK="$SDK_ROOT"
          export ANDROIDAPI="34"
          export ANDROIDMINAPI="21"

          # Accept licenses
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses 2>&1
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" 'platforms;android-34' 2>&1
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" 'build-tools;37.0.0' 2>&1

          # Run buildozer
          echo "=== Running buildozer ==="
          cd "$GITHUB_WORKSPACE"
          yes | buildozer android debug 2>&1
          echo "=== APK files ==="
          find . -name '*.apk' -ls 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NetStreamPlayer-APK
          path: bin/*.apk