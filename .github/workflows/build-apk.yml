name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            libtinfo5 cmake libffi-dev \
            libssl-dev python3-pip || {
              echo "Some packages failed, trying alternative names..."
              sudo apt-get install -y -qq \
                git zip unzip \
                autoconf libtool \
                pkg-config zlib1g-dev libncurses-dev \
                cmake libffi-dev libssl-dev python3-pip
            }
          # Install JDK - try multiple names
          sudo apt-get install -y -qq openjdk-17-jdk 2>/dev/null || \
          sudo apt-get install -y -qq openjdk-21-jdk 2>/dev/null || \
          echo "WARNING: JDK installation failed, buildozer may not work"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          # First run: let buildozer download SDK/NDK/ANT (will fail on license)
          echo "=== First run: download SDK ==="
          yes | buildozer android debug 2>&1 || true

          # Accept SDK licenses if SDK was downloaded
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          SDK_MGR=$(find "$SDK_DIR" -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -n "$SDK_MGR" ]; then
            echo "=== Accepting licenses ==="
            yes | "$SDK_MGR" --sdk_root="$SDK_DIR" --licenses 2>&1 || true
            yes | "$SDK_MGR" --sdk_root="$SDK_DIR" 'platforms;android-34' 2>&1 || true
          fi

          # Second run: actual build
          echo "=== Second run: build APK ==="
          yes | buildozer android debug 2>&1
          echo "=== APK files ==="
          find . -name '*.apk' -ls 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NetStreamPlayer-APK
          path: bin/*.apk