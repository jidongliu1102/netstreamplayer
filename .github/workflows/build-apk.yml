name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            libtinfo5 cmake libffi-dev \
            libssl-dev python3-pip || {
              echo "Some packages failed, trying alternative names..."
              sudo apt-get install -y -qq \
                git zip unzip \
                autoconf libtool \
                pkg-config zlib1g-dev libncurses-dev \
                cmake libffi-dev libssl-dev python3-pip
            }
          # Install JDK - try multiple names
          sudo apt-get install -y -qq openjdk-17-jdk 2>/dev/null || \
          sudo apt-get install -y -qq openjdk-21-jdk 2>/dev/null || \
          echo "WARNING: JDK installation failed, buildozer may not work"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          # Pre-accept Android SDK licenses by creating the license file
          mkdir -p ~/.android
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

          echo "=== Running buildozer ==="
          yes | buildozer android debug 2>&1
          echo "=== APK files ==="
          find . -name '*.apk' -ls 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NetStreamPlayer-APK
          path: bin/*.apk